name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install npm dependencies and build assets
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Create plugin zip
        id: package
        run: |
          PLUGIN_SLUG="alynt-certificates-generator"
          VERSION="${{ github.event.release.tag_name }}"

          mkdir -p build/${PLUGIN_SLUG}

          rsync -av --exclude='.git' \
                    --exclude='.github' \
                    --exclude='node_modules' \
                    --exclude='tests' \
                    --exclude='scripts' \
                    --exclude='build' \
                    --exclude='assets/src' \
                    --exclude='.gitignore' \
                    --exclude='.gitattributes' \
                    --exclude='.phpcs.xml' \
                    --exclude='.eslintrc.json' \
                    --exclude='.editorconfig' \
                    --exclude='phpunit.xml' \
                    --exclude='phpunit.xml.dist' \
                    --exclude='composer.json' \
                    --exclude='composer.lock' \
                    --exclude='composer.phar' \
                    --exclude='package.json' \
                    --exclude='package-lock.json' \
                    --exclude='*.map' \
                    --exclude='RELEASE-*.md' \
                    --exclude='deploy.sh' \
                    --exclude='deploy.example.sh' \
                    --exclude='session-context.tmp.md' \
                    --exclude='session-handoff.tmp.md' \
                    --exclude='implementation-plan.tmp.md' \
                    ./ build/${PLUGIN_SLUG}/

          cd build
          zip -r ${PLUGIN_SLUG}-${VERSION}.zip ${PLUGIN_SLUG}

          echo "zip_file=build/${PLUGIN_SLUG}-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.package.outputs.zip_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
